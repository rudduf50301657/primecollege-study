<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프라임칼리지 벼락치기 연구소</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta property="og:title" content="프라임칼리지 벼락치기 연구소">
<meta property="og:description" content="건물주로 태어나지 않은 이상 공부해야해..!">
<meta property="og:image" content="https://a-please.com/og-image.jpg">
<meta property="og:url" content="https://a-please.com">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #0f0f1a;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
  }
  h1 {
    font-size: 48px;
    font-weight: 900;
    background: linear-gradient(135deg, #8b5cf6, #06b6d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .subtitle {
    color: #888;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 48px;
  }
  .semester {
    color: #555;
    font-size: 13px;
    margin-bottom: 48px;
    padding: 6px 16px;
    border: 1px solid #333;
    border-radius: 20px;
  }
  .subjects {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 24px;
    max-width: 900px;
    width: 100%;
  }
  .subject-card {
    background: #1a1a2e;
    border: 2px solid #2a2a4a;
    border-radius: 20px;
    padding: 32px;
    text-decoration: none;
    color: #e0e0e0;
    transition: all 0.3s;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .subject-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, #8b5cf6, #06b6d4);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .subject-card:hover {
    border-color: #8b5cf6;
    transform: translateY(-6px);
    box-shadow: 0 12px 40px rgba(139, 92, 246, 0.15);
  }
  .subject-card:hover::before { opacity: 1; }
  .subject-card .icon {
    font-size: 40px;
    margin-bottom: 16px;
  }
  .subject-card h2 {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
  }
  .subject-card.coming-soon {
    opacity: 0.35;
    pointer-events: none;
  }
  .footer {
    margin-top: 60px;
    color: #444;
    font-size: 12px;
  }
  @media (max-width: 640px) {
    h1 { font-size: 32px; }
    .subjects { grid-template-columns: 1fr 1fr; gap: 16px; }
  }
  .fab-wrap { position: fixed; bottom: 28px; right: 28px; z-index: 999; }
  .fab {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, #8b5cf6, #6d28d9);
    border: none; border-radius: 50%;
    color: #fff; font-size: 22px; font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(139,92,246,0.4);
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .fab:hover { transform: scale(1.1); box-shadow: 0 6px 24px rgba(139,92,246,0.5); }
  .fab-menu {
    position: absolute; bottom: 60px; right: 0;
    background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 12px;
    padding: 8px 0; min-width: 180px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    display: none; animation: fabIn 0.2s ease;
  }
  .fab-menu.open { display: block; }
  @keyframes fabIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .fab-menu a {
    display: block; padding: 12px 20px;
    color: #c4b5fd; text-decoration: none; font-size: 14px; font-weight: 500;
    transition: background 0.15s;
  }
  .fab-menu a:hover { background: rgba(139,92,246,0.1); color: #fff; }
</style>
</head>
<body>

  <h1>프라임칼리지</h1>
  <p class="subtitle">벼락치기 연구소</p>
  <p style="color:#555; font-size:13px; margin-bottom:48px;">주인장이 수강하는 과목만 업데이트 됩니다.</p>

  <div class="subjects">
    <a href="/subjects/statistics/" class="subject-card">
      <div class="icon">📊</div>
      <h2>통계학개론</h2>
    </a>

    <a href="/subjects/math/" class="subject-card">
      <div class="icon">📐</div>
      <h2>대학기초수학</h2>
    </a>

    <div class="subject-card coming-soon">
      <div class="icon">🐍</div>
      <h2>파이썬</h2>
    </div>

    <div class="subject-card coming-soon">
      <div class="icon">⚛️</div>
      <h2>일반물리</h2>
    </div>

    <div class="subject-card coming-soon">
      <div class="icon">💻</div>
      <h2>R컴퓨팅</h2>
    </div>

    <div class="subject-card coming-soon">
      <div class="icon">🔤</div>
      <h2>대학기초영어</h2>
    </div>
  </div>

  <p class="footer">프라임칼리지 벼락치기 연구소</p>

  <div class="fab-wrap">
    <div class="fab-menu" id="fabMenu">
      <a href="https://open.kakao.com/o/s9OGoOoi" target="_blank">버그 제보 & 문의하기</a>
    </div>
    <button class="fab" onclick="document.getElementById('fabMenu').classList.toggle('open')">?</button>
  </div>

<script>fetch('/api/visitors?page=home').catch(()=>{});</script>
</body>
</html>
